# =============================================================================
# Agentic AI SOC Platform — Docker Compose
# Phase 0: Infrastructure Skeleton
# =============================================================================
#
# Services: FastAPI (ingestion), Redis, MongoDB, Pipeline Worker
# Usage:    docker compose up --build -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis — alert queue + Dead Letter Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: soc-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # MongoDB — case documents, alert history
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: soc-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # Qdrant — vector store for the RAG knowledge layer (MITRE, runbooks, cases)
  # ---------------------------------------------------------------------------
  qdrant:
    # NOTE: pin to a specific version for production reproducibility (see
    # docs/production_todo.md). Using latest for initial development.
    image: qdrant/qdrant:latest
    container_name: soc-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # Ingestion Service — FastAPI receiving Wazuh webhooks
  # ---------------------------------------------------------------------------
  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: soc-ingestion
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # API Service — read/query API + case actions powering the dashboard UI
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: soc-api
    ports:
      - "8081:8080"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # UI — React dashboard (nginx serving the built app, proxying /api)
  # ---------------------------------------------------------------------------
  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soc-ui
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # Pipeline Worker — reads from Redis, processes, writes to MongoDB
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: common/Dockerfile
    container_name: soc-worker
    ports:
      - "9100:9100"       # Prometheus metrics (standalone HTTP server)
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # Prometheus — scrapes /metrics from all application services + cAdvisor
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: soc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - ingestion
      - api
      - worker
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # Grafana — dashboards for infra + pipeline metrics (iframe-embedded in UI)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: soc-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=http://localhost:3000/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # Gateway — TLS/mTLS edge (Phase 7). Single secure entrypoint on 443.
  # Run infrastructure/pki/generate_certs.sh before starting this service.
  # ---------------------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: soc-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/pki:/etc/nginx/certs:ro
    depends_on:
      - ui
      - api
      - grafana
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # cAdvisor — container-level CPU, memory, network metrics for Prometheus
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: soc-cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - soc-network

# ---------------------------------------------------------------------------
# Volumes & Networks
# ---------------------------------------------------------------------------
volumes:
  redis-data:
  mongo-data:
  qdrant-data:
  prometheus-data:
  grafana-data:

networks:
  # The main stack OWNS this network (fixed name so the separate Wazuh compose
  # can attach to it as `external`). This means `docker compose up` works on its
  # own during development — no manual `docker network create` needed.
  soc-network:
    name: soc-network
    driver: bridge

