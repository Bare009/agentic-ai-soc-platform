# =============================================================================
# Phase 7 — AI_SOC edge gateway (TLS + mTLS).
#
# The single secure entrypoint. Terminates TLS on 443 and routes each concern
# to its own upstream (so the API stays reachable even if the UI is down):
#   /api/       -> api:8080     (read API + case actions + WebSocket)
#   /grafana/   -> grafana:3000 (dashboards)
#   /           -> ui:80        (React dashboard static app)
#
# Upstreams are resolved AT REQUEST TIME via Docker's embedded DNS, so the
# gateway survives backend container restarts (no stale-IP 502s).
#
# A client certificate is REQUESTED for every connection but only ENFORCED on
# the destructive analyst actions (approve / reject) — the human-approval gate.
# Reads, the dashboard, the live WebSocket, and Grafana work over plain TLS.
#
# Mounted at /etc/nginx/conf.d/default.conf. Certs are mounted at
# /etc/nginx/certs (generate them first: infrastructure/pki/generate_certs.sh).
# =============================================================================

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # mTLS: request a client cert, verify against our CA, but leave it OPTIONAL
    # at the connection level so reads/UI don't require one. Enforcement is
    # per-location below.
    ssl_client_certificate /etc/nginx/certs/ca.crt;
    ssl_verify_client      optional;
    ssl_verify_depth       2;

    client_max_body_size 5m;

    # Docker embedded DNS — resolve upstream names per request (cached 30s) so
    # recreating api/ui/grafana never leaves the gateway pointing at a dead IP.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # --- Protected: destructive analyst actions require a valid client cert ---
    location ~ ^/api/v1/cases/[^/]+/(approve|reject)$ {
        if ($ssl_client_verify != SUCCESS) {
            return 403;
        }
        set $upstream_api api;
        proxy_pass http://$upstream_api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Forward the verified analyst identity for audit/logging downstream.
        proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
    }

    # --- Read API + WebSocket (TLS only) ---
    location /api/ {
        set $upstream_api api;
        proxy_pass http://$upstream_api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # WebSocket upgrade for /api/v1/ws/live
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # --- Grafana dashboards (subpath, TLS only) ---
    location /grafana/ {
        set $upstream_grafana grafana;
        proxy_pass http://$upstream_grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Everything else: the UI static app ---
    location / {
        set $upstream_ui ui;
        proxy_pass http://$upstream_ui:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
