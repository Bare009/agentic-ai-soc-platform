# Prometheus configuration for the Agentic AI SOC Platform.
# Scrapes application services + cAdvisor for container-level metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ingestion
    metrics_path: /metrics/
    static_configs:
      - targets: ['ingestion:8000']
        labels:
          service: ingestion

  - job_name: api
    metrics_path: /metrics/
    static_configs:
      - targets: ['api:8080']
        labels:
          service: api

  - job_name: worker
    static_configs:
      - targets: ['worker:9100']
        labels:
          service: worker

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: cadvisor
